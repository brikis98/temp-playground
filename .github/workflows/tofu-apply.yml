name: Tofu Apply

on:
  push:
    branches:
      - main
    paths:
      - 'tofu/live/bizcloud-ai/**'

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: us-east-2
  TOFU_APPLY_ROLE_ARN: "arn:aws:iam::168852252849:role/github-actions-tofu-apply"
  TOFU_DIR: tofu/live/bizcloud-ai

jobs:
  apply-on-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Configure AWS credentials for apply (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.TOFU_APPLY_ROLE_ARN }}

      - name: Run tofu apply
        id: apply
        working-directory: ${{ env.TOFU_DIR }}
        run: |
          set -euo pipefail
          tofu init -no-color -input=false
          tofu apply -no-color -input=false -lock-timeout=60m -auto-approve

      - name: Extract summary
        id: summary
        env:
          TOFU_OUTPUT: ${{ steps.apply.outputs.stdout }}
        run: |
          summary=$(grep -E -m1 '^Apply complete!' <<<"$TOFU_OUTPUT" || grep -E -m1 '^Plan: '  <<<"$TOFU_OUTPUT" || grep -E -m1 '^No changes\.'  <<<"$TOFU_OUTPUT")
          echo "text=$summary" >> "$GITHUB_OUTPUT"

      - uses: jwalton/gh-find-current-pr@master
        id: find_pr
        with:
          state: all

      - name: Create PR apply comment
        if: steps.find_pr.outputs.number
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ steps.find_pr.outputs.number }}
          body: |
            ## OpenTofu Apply

            Commit: `${{ github.sha }}`
            Directory: `${{ env.TOFU_DIR }}`
            Result: ${{ steps.apply.outcome == 'success' && '✅ Successfully ran apply' || '❌ Error running apply' }}
            Summary: ${{ steps.summary.outputs.text }}

            <details>

            <summary>Click to see the full apply output</summary>

            ```hcl
            ${{ steps.apply.outputs.stdout }}
            ```

            </details>
