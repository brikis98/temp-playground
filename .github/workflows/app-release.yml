name: App Release

on:
  workflow_run:
    workflows:
      - App Test
    types:
      - completed

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: us-east-2
  ECR_REPO: 168852252849.dkr.ecr.us-east-2.amazonaws.com/bizcloud-ai
  AWS_ROLE_TO_ASSUME: "arn:aws:iam::168852252849:role/github-actions-docker-push"
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  publish-main:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.actor.login != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image (prod target)
        run: |
          docker build --target prod -t "${ECR_REPO}:${IMAGE_TAG}" apps/bizcloud-ai
          docker push "${ECR_REPO}:${IMAGE_TAG}"

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Update Kubernetes deployment image tag
        run: |
          cd kubernetes/apps/bizcloud-ai/overlays/eks-alb
          kustomize edit set image bizcloud-ai="${ECR_REPO}:${IMAGE_TAG}"

      # kustomize re-indents YAML files to a format yamllint doesn't like, so we use yq to fix the formatting
      - name: Reformat kustomization.yaml with yq
        uses: mikefarah/yq@v4.47.2
        with:
          cmd: yq -P -i '.' kubernetes/apps/bizcloud-ai/overlays/eks-alb/kustomization.yaml

      # We do commits from the standard username and email of the GitHub Actions bot:
      # https://github.com/orgs/community/discussions/26560
      - name: Commit and push YAML update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kubernetes/apps/bizcloud-ai/overlays/eks-alb/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No YAML changes to commit."
            exit 0
          fi
          git commit -m "chore: update EKS image tag to ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
