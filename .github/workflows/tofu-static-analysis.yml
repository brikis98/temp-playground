name: Tofu Static Analysis

on:
  pull_request:
    paths:
      - 'tofu/**'
  push:
    branches:
      - 'main'
    paths:
      - 'tofu/**'

permissions:
  contents: read

jobs:
  tofu-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: tofu fmt -check -recursive
        run: tofu fmt -check -recursive tofu

  tofu-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: tofu init -backend=false
        working-directory: tofu/live/bizcloud-ai
        run: tofu init -backend=false

      - name: tofu validate
        working-directory: tofu/live/bizcloud-ai
        run: tofu validate

  tflint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: tflint --init && tflint
        working-directory: tofu/live/bizcloud-ai
        run: |
          tflint --init
          tflint

  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: trivy config
        working-directory: tofu
        run: trivy config --severity HIGH,CRITICAL --exit-code 1 .