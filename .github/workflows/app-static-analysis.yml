name: App Static Analysis

on:
  pull_request:
    paths:
      - 'apps/bizcloud-ai/**'
  push:
    branches:
      - 'main'
    paths:
      - 'apps/bizcloud-ai/**'

permissions:
  contents: read

jobs:
  prettier:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bizcloud-ai
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/bizcloud-ai/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npx prettier --check --ignore-unknown .

  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bizcloud-ai
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/bizcloud-ai/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint static analysis
        run: npx eslint .
