name: Kubernetes Static Analysis

on:
  pull_request:
    paths:
      - 'kubernetes/**'
  push:
    branches:
      - '**'
    paths:
      - 'kubernetes/**'

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: python -m pip install --user yamllint

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: yamllint kubernetes/
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd kubernetes
          yamllint .

      - name: Validate kustomize builds
        run: |
          kustomize build kubernetes/base >/dev/null
          kustomize build kubernetes/overlays/docker-desktop >/dev/null
          kustomize build kubernetes/overlays/eks-alb >/dev/null
          kustomize build kubernetes/argocd >/dev/null

      - name: trivy config kubernetes/
        run: trivy config --severity MEDIUM,HIGH,CRITICAL --exit-code 1 kubernetes/
