name: Kubernetes Static Analysis

on:
  pull_request:
    paths:
      - 'kubernetes/**'
  push:
    branches:
      - 'main'
    paths:
      - 'kubernetes/**'

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: python -m pip install --user yamllint

      - name: yamllint kubernetes/
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd kubernetes
          yamllint .

  kustomize-and-trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Run Kubernetes static analysis
        run: ./kubernetes/run-static-analysis.sh
