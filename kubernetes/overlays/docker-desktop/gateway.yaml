apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: bizcloud-ai-gateway
spec:
  gatewayClassName: nginx
  infrastructure:
    parametersRef:
      group: gateway.nginx.org
      kind: NginxProxy
      name: bizcloud-ai-local-proxy
  listeners:
  - name: http
    protocol: HTTP
    port: 80
---
apiVersion: gateway.nginx.org/v1alpha2
kind: NginxProxy
metadata:
  name: bizcloud-ai-local-proxy
spec:
  kubernetes:
    service:
      type: LoadBalancer
