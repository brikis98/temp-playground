apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../_shared/base
patches:
  - target:
      kind: Deployment
      name: app
    path: deployment-env-patch.yaml
  - target:
      kind: Deployment
      name: app
    path: deployment-patch.yaml
  - target:
      kind: Service
      name: app
    path: service-patch.yaml
