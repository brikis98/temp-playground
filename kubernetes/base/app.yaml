apiVersion: apps/v1
kind: Deployment
metadata:
  name: bizcloud-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bizcloud-ai
  template:
    metadata:
      labels:
        app: bizcloud-ai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bizcloud-ai
          image: bizcloud-ai:prod
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=bizcloud-ai,deployment.environment=prod,k8s.cluster.name=jim-testing,k8s.namespace.name=$(NAMESPACE),k8s.deployment.name=$(DEPLOYMENT_NAME),k8s.pod.name=$(POD_NAME),k8s.node.name=$(NODE_NAME)
            - name: OTEL_AWS_APPLICATION_SIGNALS_ENABLED
              value: "true"
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_LOGS_EXPORTER
              value: none
            - name: OTEL_TRACES_SAMPLER
              value: xray
            - name: OTEL_TRACES_SAMPLER_ARG
              value: endpoint=http://cloudwatch-agent.amazon-cloudwatch:2000
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://cloudwatch-agent.amazon-cloudwatch:4316/v1/traces
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: http://cloudwatch-agent.amazon-cloudwatch:4316/v1/metrics
            - name: OTEL_PROPAGATORS
              value: tracecontext,baggage,b3,xray-lambda
            - name: NODE_OPTIONS
              value: --import @aws/aws-distro-opentelemetry-node-autoinstrumentation/register
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DEPLOYMENT_NAME
              value: bizcloud-ai
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bizcloud-ai
spec:
  type: LoadBalancer
  selector:
    app: bizcloud-ai
  ports:
    - port: 80
      targetPort: 8080
